<meta charset="UTF-8">
<title>Puzzle Challenge</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
}

h2 {
    margin-top: 20px;
}

#board {
    width: 600px;
    height: 400px;
    margin: 20px auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border: 3px solid #333;
}

.tile {
    border: 1px solid #ccc;
    background-image: url('IMGAE123.jpg'); /* ✅ your file */
    background-size: 600px 400px; /* ✅ ensures correct alignment */
    cursor: pointer;
}

.tile.selected {
    border: 3px solid red;
}

#reveal {
    display: none;
    margin-top: 30px;
    font-size: 20px;
    background: white;
    padding: 15px;
    display-inline: block;
    border-radius: 10px;
}
</style>

<body>

<h2>🧩 Solve the puzzle</h2>

<div id="board"></div>

<div id="reveal">
    🎉 Well done!  
    <br><br>
    👉 <a href="https://dnbnl.sharepoint.com/:b:/r/sites/TM-InterneModellen/DepartmentalDocuments2/IM%20activities/imday_reveal.pdf?csf=1&web=1&e=iJPLLT" target="_blank"> 
        Click here for the next step
    </a>
</div>

<script>
const rows = 4;
const cols = 4;
const board = document.getElementById("board");

let tiles = [];

// create tiles
for (let i = 0; i < rows * cols; i++) {
    const tile = document.createElement("div");
    tile.classList.add("tile");

    let x = i % cols;
    let y = Math.floor(i / cols);

    tile.style.backgroundPosition = `-${x * 150}px -${y * 100}px`;
    tile.dataset.correct = i;

    tiles.push(tile);
}

// shuffle tiles
tiles.sort(() => Math.random() - 0.5);

// render
tiles.forEach(t => board.appendChild(t));

// click swap logic
let selected = null;

board.addEventListener("click", (e) => {
    if (!e.target.classList.contains("tile")) return;

    if (!selected) {
        selected = e.target;
        selected.classList.add("selected");
    } else {
        let second = e.target;

        // swap background
        [selected.style.backgroundPosition, second.style.backgroundPosition] =
        [second.style.backgroundPosition, selected.style.backgroundPosition];

        // swap correct index
        [selected.dataset.correct, second.dataset.correct] =
        [second.dataset.correct, selected.dataset.correct];

        selected.classList.remove("selected");
        selected = null;

        checkSolved();
    }
});

// check if solved
function checkSolved() {
    const solved = [...board.children].every((tile, index) =>
        parseInt(tile.dataset.correct) === index
    );

    if (solved) {
        document.getElementById("reveal").style.display = "block";
    }
}
</script>

</body>
